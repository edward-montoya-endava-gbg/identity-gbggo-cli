name: journey-sessions-list
description: |
  List journey sessions for an organisation, newest first.
  Query params: page, perPage, sortBy, filterBy, mode.
  Defaults match the UserView UI: mode=PRE (test/dev data), sort by
  startedDateTime desc, 25 per page. Pass --var mode=PROD to query
  real customer sessions instead.
method: GET
path: /{orgId}/journey-sessions?page={page}&perPage={perPage}&sortBy={sortBy}&filterBy={filterBy}&mode={mode}
auth: bearer
required_vars:
  - name: orgId
    kind: string
    description: Organisation ID.
    example: "gbg"
optional_vars:
  - name: page
    kind: string
    description: Page number (1-indexed).
    default: "1"
  - name: perPage
    kind: string
    description: Records per page (max 100).
    default: "25"
  - name: sortBy
    kind: string
    description: Sort spec, format `field:asc|desc`.
    default: "startedDateTime:desc"
  - name: filterBy
    kind: string
    description: Filter expression.
    default: ""
  - name: mode
    kind: string
    description: |
      Session mode. Enum: `PRE` (test/dev data, default) | `PROD`
      (real customer sessions). Both should return data in dev.
    default: "PRE"
