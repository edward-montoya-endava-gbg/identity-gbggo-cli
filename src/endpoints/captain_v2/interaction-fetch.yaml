name: interaction-fetch
description: Fetch current interaction data (pages, cards) for an instance.
method: POST
path: /interaction/fetch
auth: bearer
required_vars:
  - name: instanceId
    kind: string
    description: Journey instance ID.
    example: "01HX..."
optional_vars:
  - name: interactionId
    kind: string
    description: Optional specific interaction ID to fetch.
    default: ""
body_template: |
  {
    "instanceId": {{ instanceId | json_encode }},
    "interactionId": {{ interactionId | json_encode }}
  }
