name: journey-history
description: Get the history of a journey instance (gated by ENABLE_HISTORY_API on server).
method: POST
path: /journey/history
auth: bearer
required_vars:
  - name: instanceId
    kind: string
    description: Journey instance ID.
    example: "01HX..."
body_template: |
  { "instanceId": {{ instanceId | json_encode }} }
