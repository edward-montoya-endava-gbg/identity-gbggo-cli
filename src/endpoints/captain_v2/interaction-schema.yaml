name: interaction-schema
description: Get the schema for the current interaction.
method: POST
path: /interaction/schema
auth: bearer
required_vars:
  - name: instanceId
    kind: string
    description: Journey instance ID.
    example: "01HX..."
optional_vars:
  - name: interactionId
    kind: string
    description: Optional specific interaction ID.
    default: ""
body_template: |
  {
    "instanceId": {{ instanceId | json_encode }},
    "interactionId": {{ interactionId | json_encode }}
  }
