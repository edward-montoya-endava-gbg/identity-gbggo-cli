name: journey-start
description: |
  Start a customer journey instance from a published resourceId.
  `context` is a `kind: json` body field (recommended to pre-fill subject data).
method: POST
path: /journey/start
auth: bearer
required_vars:
  - name: resourceId
    kind: string
    description: |
      Journey resource ID. Captain v2 format: `{grId}@{version}` (e.g.
      `a4c68509c24789888eb466@latest`).
    example: "7bf6a284b880050663d1a2778a3a2ceca4573708bd9e6fadba5a7bae6c3c80bb@1edc50mp"
  - name: context
    kind: json
    description: |
      Initial JSON context object (e.g. pre-filled subject identity). Shape:
      `{config:{delivery:"api"}, subject:{identity:{firstName, lastNames,
      dateOfBirth, currentAddress, ...}}}`.
    example: |
      {"config":{"delivery":"api"},"subject":{"identity":{"firstName":"JOHN","lastNames":["smith"],"dateOfBirth":"1987-01-12","currentAddress":{"lines":["222333 PEACHTREE PLACE"],"locality":"ATLANTA","dependentLocality":"GA","postalCode":"30318","country":"US","administrativeArea":"GA"}}}}
body_template: |
  {
    "resourceId": {{ resourceId | json_encode }},
    "context": {{ context | json_encode | safe }}
  }
