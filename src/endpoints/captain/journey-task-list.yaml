name: journey-task-list
description: List tasks for a Captain v1 journey instance (end-user token).
auth: bearer
supported_versions: [v1]
versions:
  v1:
    method: POST
    path: /journey/task/list
    required_vars:
      - name: journeyId
        kind: string
        description: Designer journey UUID.
        example: "9f1e..."
      - name: instanceId
        kind: string
        description: Journey instance ID.
        example: "inst-..."
    optional_vars:
      - name: filter
        kind: json
        description: Optional filter object.
        default: "{}"
    body_template: |
      {
        "journeyId": {{ journeyId | json_encode }},
        "instanceId": {{ instanceId | json_encode }},
        "filter": {{ filter | json_encode | safe }}
      }
