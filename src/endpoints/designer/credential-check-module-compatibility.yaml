name: credential-check-module-compatibility
description: |
  Check credential module compatibility.
  # TODO: verify path with upstream — body-defaults inventory does not list a
  # definitive path. Current path mirrors the legacy
  # /credential/actions/check-module-compatibility route prefixed with /resources.
method: POST
path: /resources/{orgId}/credential/actions/check-module-compatibility
auth: bearer
required_vars:
  - name: orgId
    kind: string
    description: Organisation ID.
    example: "b0f48b6d-2ff7-458e-874b-ee10d686f6bb"
  - name: modules
    kind: json
    description: JSON array of module identifiers.
    example: '["mod1"]'
body_template: |
  { "modules": {{ modules | json_encode | safe }} }
