name: credential-check-module-compatibility
description: |
  Generic credential action — validates and persists a credential for the
  given resource type. Path verified against gong-forms actions.controller.ts:
  `@Post(':orgId/:type/actions/credential')`. This is the GENERIC
  credential-action endpoint parameterised by resource type, not a specific
  "check compatibility" call.
  # TODO: verify body shape with upstream — discovered via /actions/credential
  # controller; the @Body() DTO is PersistCredentialParams { moduleGrId,
  # credentialFormKey, credentialId, credential }, but real usage / required
  # subset against the dev server still needs confirmation.
method: POST
path: /resources/{orgId}/{type}/actions/credential
auth: bearer
required_vars:
  - name: orgId
    kind: string
    description: Organisation ID.
    example: "b0f48b6d-2ff7-458e-874b-ee10d686f6bb"
  - name: type
    kind: string
    description: |
      Resource type — enum-like, e.g. `journey` or `delivery`. Used for
      auth/permission scoping on the generic credential action route.
    example: "journey"
  - name: moduleGrId
    kind: string
    description: Module GR ID — `model[@version]/variant` form.
    example: "model@1/variant"
  - name: credentialFormKey
    kind: string
    description: Credential form key.
    example: "form-key"
  - name: credentialId
    kind: string
    description: Credential identifier.
    example: "cred-..."
  - name: credential
    kind: json
    description: Credential entry payload (CredentialEntry shape).
    example: '{}'
body_template: |
  { "moduleGrId": {{ moduleGrId | json_encode }}, "credentialFormKey": {{ credentialFormKey | json_encode }}, "credentialId": {{ credentialId | json_encode }}, "credential": {{ credential | json_encode | safe }} }
