name: audit-project
description: |
  Fetch audit records for a project (paginated).
  `project` is enum-restricted to one of: `designer`, `userview`.
  `orgId` is required as a query param.
method: GET
path: /audit/{project}
auth: bearer
required_vars:
  - name: project
    kind: string
    description: |
      Audit project name. Enum-restricted: must be `designer` or `userview`.
    example: "designer"
