name: export-superflow
description: |
  Export a superflow (multi-journey bundle).
  # TODO: verify path with upstream — body-defaults inventory does not list a
  # definitive path; current value mirrors the export-journey best-effort route.
method: POST
path: /resources/{orgId}/journey/actions/export-superflow
auth: bearer
required_vars:
  - name: orgId
    kind: string
    description: Organisation ID.
    example: "b0f48b6d-2ff7-458e-874b-ee10d686f6bb"
  - name: journeyId
    kind: string
    description: Journey ID.
    example: "2cfe3ac73af566f4695624216a3cf92243c182ccf77e0537fdb6f992f59e8a41"
body_template: |
  { "journeyId": {{ journeyId | json_encode }} }
