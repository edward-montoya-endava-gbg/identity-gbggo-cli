name: journey-revisions-create
description: |
  Create a new resource revision for an organisation.
  Controller: @Post(':orgId/:type/revisions') under /resources prefix.
method: POST
path: /resources/{orgId}/{type}/revisions
auth: bearer
required_vars:
  - name: orgId
    kind: string
    description: Organisation ID (path parameter).
    example: "b0f48b6d-2ff7-458e-874b-ee10d686f6bb"
  - name: type
    kind: string
    description: |
      Resource type. One of: journey, delivery, brand, license, flow,
      template, image, organization.
    example: "journey"
  - name: data
    kind: json
    description: Resource data JSON.
    example: '{"nodes":[]}'
  - name: metadata
    kind: json
    description: Resource metadata JSON.
    example: '{"name":"My Journey"}'
body_template: |
  {
    "data": {{ data | json_encode | safe }},
    "metadata": {{ metadata | json_encode | safe }}
  }
