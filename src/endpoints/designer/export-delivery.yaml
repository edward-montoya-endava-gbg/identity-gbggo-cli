name: export-delivery
description: |
  Export a delivery (and linked journey) for backup or migration.
  Uses the /delivery/internal/actions/export path per body-defaults inventory.
method: POST
path: /resources/{orgId}/delivery/internal/actions/export
auth: bearer
required_vars:
  - name: orgId
    kind: string
    description: Organisation ID.
    example: "b0f48b6d-2ff7-458e-874b-ee10d686f6bb"
  - name: deliveryId
    kind: string
    description: Delivery ID.
    example: "4bc224a4..."
body_template: |
  { "deliveryId": {{ deliveryId | json_encode }} }
