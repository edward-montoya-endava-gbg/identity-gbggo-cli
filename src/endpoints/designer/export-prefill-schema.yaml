name: export-prefill-schema
description: |
  Export the prefill JSON schema for a delivery. Note this is under
  /delivery/actions/, NOT /journey/actions/ — used to integrate prefill into
  external forms.
  # Body verified via export-prefill-schema.controller.ts and its DTO
  # (DeliveryRevision { deliveryRevisionId, version } from actions.interface.ts).
method: POST
path: /resources/{orgId}/delivery/actions/schema/prefill/export
auth: bearer
required_vars:
  - name: orgId
    kind: string
    description: Organisation ID.
    example: "b0f48b6d-2ff7-458e-874b-ee10d686f6bb"
  - name: deliveryRevisionId
    kind: string
    description: Delivery revision ID to export prefill schema for.
    example: "4bc224a4..."
  - name: version
    kind: string
    description: |
      Delivery revision version. MUST be the latest/head revision — older
      revisions exist in history but the export action looks up the published
      artifact and 404s on them. Pick `journey-revisions-list type=delivery`
      and use `.resources[<id>].history[0].version`.
    example: "1"
body_template: |
  { "deliveryRevisionId": {{ deliveryRevisionId | json_encode }}, "version": {{ version | json_encode }} }
