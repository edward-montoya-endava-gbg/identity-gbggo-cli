name: archive-journey
description: |
  Archive a journey (soft-delete). Renamed server-side from `archive-journey`
  to `archive` under /resources/{orgId}/journey/actions/.
disabled: true
disabled_reason: "pending verification — write endpoint, needs more testing before live use"
method: POST
path: /resources/{orgId}/journey/actions/archive
auth: bearer
required_vars:
  - name: orgId
    kind: string
    description: Organisation ID.
    example: "b0f48b6d-2ff7-458e-874b-ee10d686f6bb"
  - name: journeyId
    kind: string
    description: Journey ID to archive.
    example: "2cfe3ac73af566f4695624216a3cf92243c182ccf77e0537fdb6f992f59e8a41"
body_template: |
  { "journeyId": {{ journeyId | json_encode }} }
