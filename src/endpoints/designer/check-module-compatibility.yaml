name: check-module-compatibility
description: |
  Check whether the given flow nodes are compatible with a journey.
  Path verified against gong-forms CheckModuleCompatibilityController:
  `@Post(':orgId/journey/actions/check-module-compatibility')`.
  Body verified via CheckModuleCompatibilityDto — the array key is `nodes`
  (max 200), each entry being a journey flow-graph node (FlowNodeDto).
method: POST
path: /resources/{orgId}/journey/actions/check-module-compatibility
auth: bearer
required_vars:
  - name: orgId
    kind: string
    description: Organisation ID.
    example: "b0f48b6d-2ff7-458e-874b-ee10d686f6bb"
  - name: nodes
    kind: json
    description: |
      JSON array of journey flow-graph nodes (FlowNodeDto[]). Max 200 entries.
      Each node is a module/flow node from the journey definition.
    example: '[]'
body_template: |
  { "nodes": {{ nodes | json_encode | safe }} }
