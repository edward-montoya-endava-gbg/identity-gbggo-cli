name: export-journey
description: |
  Export a journey definition as JSON.
  Path + body verified against gong-forms ExportJourneyController:
  `@Post(':orgId/journey/actions/export')` with `@Body() ExportJourneyDto { journeyId, version }`.
method: POST
path: /resources/{orgId}/journey/actions/export
auth: bearer
required_vars:
  - name: orgId
    kind: string
    description: Organisation ID.
    example: "gbg"
  - name: journeyId
    kind: string
    description: Journey ID.
    example: "00083914cdf93a2e7017a8dbf61b9082301b593167cd576ac8e6eba437fee85f"
  - name: version
    kind: string
    description: Journey revision version string (e.g. "1xzsdevt"). Get from journey-revisions-list .history[].version.
    example: "1xzsdevt"
body_template: |
  { "journeyId": {{ journeyId | json_encode }}, "version": {{ version | json_encode }} }
