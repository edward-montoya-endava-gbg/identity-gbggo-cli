name: link-journey-to-child
description: |
  Link a parent journey to a child journey in another organisation.
disabled: true
disabled_reason: "pending verification — write endpoint, needs more testing before live use"
method: POST
path: /resources/{orgId}/journey/actions/link-journey-to-child
auth: bearer
required_vars:
  - name: orgId
    kind: string
    description: Parent organisation ID.
    example: "b0f48b6d-2ff7-458e-874b-ee10d686f6bb"
  - name: parentId
    kind: string
    description: Parent journey ID.
    example: "2cfe3ac73af566f4695624216a3cf92243c182ccf77e0537fdb6f992f59e8a41"
  - name: childOrgId
    kind: string
    description: Child organisation ID.
    example: "child-org-..."
  - name: childJourneyId
    kind: string
    description: Child journey ID.
    example: "j-..."
body_template: |
  {
    "parentId": {{ parentId | json_encode }},
    "childOrgId": {{ childOrgId | json_encode }},
    "childJourneyId": {{ childJourneyId | json_encode }}
  }
