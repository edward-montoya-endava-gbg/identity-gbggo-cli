name: journey-device-validate
description: Validate a device credential (end-user token).
method: POST
path: /journey/device/validate
auth: bearer
required_vars:
  - name: credential
    kind: string
    description: Credential value to validate.
    example: "cred-..."
  - name: type
    kind: string
    description: Credential type.
    example: "device-jwt"
body_template: |
  {
    "credential": {{ credential | json_encode }},
    "type": {{ type | json_encode }}
  }
