name: journey-task-list-schema
description: Get the schema for the Captain v1 task list (end-user token).
method: POST
path: /journey/task/list/schema
auth: bearer
required_vars:
  - name: journeyId
    kind: string
    description: Designer journey UUID.
    example: "9f1e..."
  - name: instanceId
    kind: string
    description: Journey instance ID.
    example: "inst-..."
body_template: |
  {
    "journeyId": {{ journeyId | json_encode }},
    "instanceId": {{ instanceId | json_encode }}
  }
