name: journey-task-schema
description: Get the schema for a Captain v1 task (end-user token).
method: POST
path: /journey/task/schema
auth: bearer
required_vars:
  - name: journeyId
    kind: string
    description: Designer journey UUID.
    example: "9f1e..."
  - name: taskId
    kind: string
    description: Task identifier.
    example: "task-..."
body_template: |
  {
    "journeyId": {{ journeyId | json_encode }},
    "taskId": {{ taskId | json_encode }}
  }
