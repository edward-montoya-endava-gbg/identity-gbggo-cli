name: journey-state-delete
description: Delete state of a Captain v1 journey instance (destructive).
method: POST
path: /journey/state/delete
auth: bearer
required_vars:
  - name: journeyId
    kind: string
    description: Designer journey UUID.
    example: "9f1e..."
  - name: instanceId
    kind: string
    description: Journey instance ID.
    example: "inst-..."
body_template: |
  {
    "journeyId": {{ journeyId | json_encode }},
    "instanceId": {{ instanceId | json_encode }}
  }
