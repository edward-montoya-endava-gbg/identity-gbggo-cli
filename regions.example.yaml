# goctl regions.yaml — example. Copy to $XDG_CONFIG_HOME/goctl/regions.yaml
# or ~/.config/goctl/regions.yaml and fill in the real values.
#
# IMPORTANT: this file MUST NOT contain any secrets. Only *_env references that
# name the environment variable holding the secret are permitted. The CLI
# config schema rejects literal `client_secret` / `password` / `token` / `client_id`
# fields with a serde "unknown field" error. See .env.example for the env vars.
#
# Grant policy: every callable (env, service) tuple uses the OAuth2 `password`
# grant — `flow-api-test` (Designer + Captain) and `userview-full` (UserView)
# are Keycloak USERS, not service-account clients, so credentials are real
# username + password values supplied via env vars. Designer + UserView prod
# are bearer-only (`auth: null`) — supply `--token` or `GGO_BEARER_TOKEN`.
#
# Captain is a single SERVICE with multiple VERSIONS (v1, v2, ...). Each
# (env, region) declares a per-version `base_urls:` map; the CLI picks the
# URL by the resolved version (`--version v1` flag, or
# `default_version:` below, or — when an endpoint supports a single version
# only — inferred). Adding v3 later is purely a manifest + regions.yaml edit;
# no CLI rebuild is needed for callers staying on v1/v2.
#
# Path conventions: Captain v1 base = /captain/api, Captain v2 base = /v2/captain,
# Designer base = /designer/api, UserView base = /view/api. Endpoint manifests
# carry relative paths (e.g. /journey/start) appended to the base_url for that
# version.

captain:
  envs:
    dev:
      default_version: v2
      regions:
        eu:
          base_urls:
            v1: https://gbggo4-dev.nonprod.fabric.gbgplatforms.com/captain/api
            v2: https://gbggo4-dev.nonprod.fabric.gbgplatforms.com/v2/captain
      auth:
        grant_type: password
        token_url: https://gbggo4-dev.nonprod.fabric.gbgplatforms.com/auth/realms/go/protocol/openid-connect/token
        client_id_env: GGO_CAPTAIN_DEV_CLIENT_ID
        client_secret_env: GGO_CAPTAIN_DEV_CLIENT_SECRET
        username_env: GGO_CAPTAIN_DEV_USERNAME
        password_env: GGO_CAPTAIN_DEV_PASSWORD
        scope: openid
    demo:
      default_version: v2
      regions:
        eu:
          base_urls:
            v1: https://gbggo4-demo-eu.nonprod.fabric.gbgplatforms.com/captain/api
            v2: https://gbggo4-demo-eu.nonprod.fabric.gbgplatforms.com/v2/captain
        us:
          base_urls:
            v1: https://gbggo4-demo-us.nonprod.fabric.gbgplatforms.com/captain/api
            v2: https://gbggo4-demo-us.nonprod.fabric.gbgplatforms.com/v2/captain
        au:
          base_urls:
            v1: https://gbggo4-demo-au.nonprod.fabric.gbgplatforms.com/captain/api
            v2: https://gbggo4-demo-au.nonprod.fabric.gbgplatforms.com/v2/captain
      auth:
        grant_type: password
        token_url: https://gbggo4-demo.nonprod.fabric.gbgplatforms.com/auth/realms/go/protocol/openid-connect/token
        client_id_env: GGO_CAPTAIN_DEMO_CLIENT_ID
        client_secret_env: GGO_CAPTAIN_DEMO_CLIENT_SECRET
        username_env: GGO_CAPTAIN_DEMO_USERNAME
        password_env: GGO_CAPTAIN_DEMO_PASSWORD
        scope: openid
    prod:
      default_version: v2
      regions:
        eu:
          base_urls:
            v1: https://eu.platform.go.gbgplc.com/captain/api
            v2: https://eu.platform.go.gbgplc.com/v2/captain
        us:
          base_urls:
            v1: https://us.platform.go.gbgplc.com/captain/api
            v2: https://us.platform.go.gbgplc.com/v2/captain
        au:
          base_urls:
            v1: https://au.platform.go.gbgplc.com/captain/api
            v2: https://au.platform.go.gbgplc.com/v2/captain
      auth:
        grant_type: password
        token_url: https://eu.platform.go.gbgplc.com/auth/realms/go/protocol/openid-connect/token   # confirm with ops
        client_id_env: GGO_CAPTAIN_PROD_CLIENT_ID
        client_secret_env: GGO_CAPTAIN_PROD_CLIENT_SECRET
        username_env: GGO_CAPTAIN_PROD_USERNAME
        password_env: GGO_CAPTAIN_PROD_PASSWORD
        scope: openid

